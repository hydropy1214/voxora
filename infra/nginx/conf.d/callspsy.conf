# ============================================================
#  CallsPsy Nginx Configuration
#  - HTTP → HTTPS redirect
#  - WebSocket (Socket.io) proxy
#  - API reverse proxy
#  - Frontend reverse proxy
#  - Rate limiting
#  - Security headers
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=100r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=30r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream definitions
upstream backend_api {
    server backend:3001 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

upstream frontend_app {
    server frontend:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── HTTP server (redirect to HTTPS or serve directly) ──────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint (no redirect for load balancer probes)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect HTTP → HTTPS if SSL is configured
    # Comment this out if running without SSL
    location / {
        # Check if SSL certs exist
        # return 301 https://$host$request_uri;
        
        # For non-SSL deployments, proxy directly
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }

    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

