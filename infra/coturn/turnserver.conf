# Coturn STUN/TURN Server Configuration for CallsPsy

# Listening port
listening-port=3478
tls-listening-port=5349

# Relay address
relay-ip=0.0.0.0

# External IP (set in production)
# external-ip=PUBLIC_IP

# Auth
use-auth-secret
static-auth-secret=change-me-coturn-secret

# Realm
realm=callspsy.com

# Logging
log-file=/var/log/coturn/turnserver.log
syslog

# Security
no-tlsv1
no-tlsv1_1
cipher-list="ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256"

# RTP relay port range
min-port=10000
max-port=20000

# Deny loopback
no-loopback-peers

# Deny multicast
no-multicast-peers

# Verbose logging off in production
# verbose
