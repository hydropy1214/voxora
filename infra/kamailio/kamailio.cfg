#!KAMAILIO
# Voxora SIP Proxy Configuration
# Outbound-only SIP proxy with load balancing

####### Global Parameters #########
debug=2
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=8
tcp_children=4

# SIP ports
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# TLS
enable_tls=1
listen=tls:0.0.0.0:5061

# Paths
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

####### Modules Section ########
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "sl.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "acc.so"
loadmodule "dispatcher.so"
loadmodule "htable.so"
loadmodule "pike.so"
loadmodule "tls.so"
loadmodule "jsonrpcs.so"
loadmodule "kex.so"

####### Module Parameters #########
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

modparam("rr", "enable_full_lr", 1)

modparam("usrloc", "db_mode", 0)

modparam("dispatcher", "db_mode", 0)
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "dst_avp", "$avp(ds_dst)")
modparam("dispatcher", "grp_avp", "$avp(ds_grp)")
modparam("dispatcher", "cnt_avp", "$avp(ds_cnt)")
modparam("dispatcher", "algo_avp", "$avp(ds_algo)")
modparam("dispatcher", "dstid_avp", "$avp(ds_dstid)")
modparam("dispatcher", "attrs_avp", "$avp(ds_attrs)")
modparam("dispatcher", "hash_pvar", "$avp(ds_algo)")

# Pike (DoS protection)
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# TLS
modparam("tls", "config", "/etc/kamailio/tls.cfg")

####### Routing Logic ########

request_route {
    # per request initial checks
    route(REQINIT);

    # handle CANCEL and SUBSCRIBE early
    if (is_method("CANCEL")) {
        if (t_check_trans()) { t_relay(); }
        exit;
    }

    if (is_method("NOTIFY|SUBSCRIBE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # Only handle INVITE and REGISTER
    if (!is_method("INVITE|REGISTER|OPTIONS|BYE|ACK")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    route(OPTIONS_REPLY);
    route(WITHINDLG);
    route(AUTH);

    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    if (is_method("INVITE")) {
        route(INVITE_OUTBOUND);
        exit;
    }

    route(RELAY);
}

route[REQINIT] {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("INVITE")) {
        if (!sanity_check("17895", "7")) {
            xlog("Malformed SIP request from $si:$sp\n");
            exit;
        }
    }
}

route[OPTIONS_REPLY] {
    if (is_method("OPTIONS") && uri==myself) {
        sl_send_reply("200", "OK");
        exit;
    }
}

route[WITHINDLG] {
    if (!has_totag()) return;

    if (loose_route()) {
        route(RELAY);
        exit;
    }

    sl_send_reply("404", "Not here");
    exit;
}

route[AUTH] {
    # Outbound proxy - trust internal network
    if (src_ip == "172.20.0.0/24") return;

    # External traffic gets SIP auth (simplified)
    return;
}

route[REGISTRAR] {
    # Outbound only - no registrar needed
    sl_send_reply("200", "OK");
    exit;
}

route[INVITE_OUTBOUND] {
    # Outbound call routing
    record_route();

    # Route to FreeSWITCH if coming from internal
    if (src_ip == "172.20.0.0/24") {
        # Forward to configured SIP gateway
        if (!ds_select_dst("1", "4")) {
            sl_send_reply("503", "Service Unavailable");
            exit;
        }
        route(RELAY);
        exit;
    }

    sl_send_reply("403", "Forbidden");
    exit;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) exit;

    # On failure, try next destination
    if (ds_next_dst()) {
        route(RELAY);
        exit;
    }
}
