#!KAMAILIO
# ============================================================
#  Voxora Kamailio SIP Proxy Configuration
#  - Outbound-only SIP proxy
#  - AWS EC2 NAT traversal
#  - RTPengine integration for media relay
#  - Rate limiting + DoS protection
#  - Dispatcher for FreeSWITCH load balancing
# ============================================================

####### Global Parameters #########

debug=2
log_stderror=yes
log_facility=LOG_LOCAL0
fork=yes
children=8
tcp_children=4
tcp_max_connections=4096

# Memory
pkg_mem=64
shm_mem=512

# Aliases (set to actual public IP via env)
# These are overridden by #!substdef below

####### Pre-processor definitions #########

# Pull IPs from environment (set by docker-compose)
#!substdef "!MY_IP!PRIVATE_IP_PLACEHOLDER!g"
#!substdef "!MY_PUBLIC_IP!PUBLIC_IP_PLACEHOLDER!g"
#!substdef "!FREESWITCH_IP!127.0.0.1!g"
#!substdef "!FREESWITCH_PORT!5080!g"
#!substdef "!RTPENGINE_IP!127.0.0.1!g"
#!substdef "!RTPENGINE_PORT!2223!g"

####### Listening Ports #########

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061

# Force external IP in Contact/Via headers for NAT
advertised_address="MY_PUBLIC_IP"

####### Modules Section #########

mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

# Core modules
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "sl.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "acc.so"

# Dispatcher (load balancing to FreeSWITCH)
loadmodule "dispatcher.so"

# RTPengine media relay
loadmodule "rtpengine.so"

# Pike (DoS/DDoS protection)
loadmodule "pike.so"

# NAT traversal
loadmodule "nathelper.so"

# htable for rate limiting
loadmodule "htable.so"

# TLS
# loadmodule "tls.so"

# JSONRPC
loadmodule "jsonrpcs.so"

# Kex (core extensions)
loadmodule "kex.so"

####### Module Parameters #########

# TM (Transaction Management)
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("tm", "auto_inv_100", 1)

# Record Route
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# USR Location (memory only — no registration storage needed)
modparam("usrloc", "db_mode", 0)

# Dispatcher — FreeSWITCH backends
modparam("dispatcher", "db_mode", 0)
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "dst_avp", "$avp(ds_dst)")
modparam("dispatcher", "grp_avp", "$avp(ds_grp)")
modparam("dispatcher", "cnt_avp", "$avp(ds_cnt)")
modparam("dispatcher", "dstid_avp", "$avp(ds_dstid)")
modparam("dispatcher", "attrs_avp", "$avp(ds_attrs)")
modparam("dispatcher", "ping_interval", 5)
modparam("dispatcher", "ping_from", "sip:voxora@MY_PUBLIC_IP:5060")

# RTPengine — media relay
modparam("rtpengine", "rtpengine_sock", "udp:RTPENGINE_IP:RTPENGINE_PORT")
modparam("rtpengine", "rtpengine_disable_tout", 15)
modparam("rtpengine", "rtpengine_tout_ms", 1000)
modparam("rtpengine", "rtpengine_retr", 5)
modparam("rtpengine", "setid_default", 0)

# Pike (DoS protection)
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# NAT helper
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "nat_addr_mode", 1)

# htable for call rate tracking
modparam("htable", "htable", "srcip=>size=8;autoexpire=10")

# JSONRPC
modparam("jsonrpcs", "fifo_name", "/var/run/kamailio/kamailio_rpc.fifo")
modparam("jsonrpcs", "transport", 7)

####### Routing Logic #########

request_route {
  # Per-request initial checks
  route(REQINIT);

  # Handle retransmissions
  if (!is_method("ACK")) {
    if (t_precheck_trans()) {
      t_check_trans();
      exit;
    }
    t_check_trans();
  }

  # Handle CANCEL
  if (is_method("CANCEL")) {
    if (t_check_trans()) {
      route(RELAY);
    }
    exit;
  }

  # Handle within-dialog requests
  route(WITHINDLG);

  # Only process initial requests beyond this point
  if (has_totag()) {
    sl_send_reply("400", "Bad Request");
    exit;
  }

  # Remove Route header
  loose_route();

  # Handle REGISTER (reject — outbound only)
  if (is_method("REGISTER")) {
    sl_send_reply("405", "Method Not Allowed");
    exit;
  }

  # Handle OPTIONS (keepalive from SIP providers)
  route(OPTIONS_REPLY);

  # Handle INVITE (outbound calls)
  if (is_method("INVITE")) {
    route(INVITE_OUTBOUND);
    exit;
  }

  # Handle BYE/ACK
  if (is_method("BYE|ACK")) {
    route(RELAY);
    exit;
  }

  # Reject everything else
  sl_send_reply("405", "Method Not Allowed");
  exit;
}

# ── REQINIT: Sanity checks ─────────────────────────────────────────────────
route[REQINIT] {
  # Sanity check
  if (!sanity_check("17895", "7")) {
    xlog("L_WARN", "Malformed SIP from $si:$sp — dropping\n");
    exit;
  }

  # Max-Forwards check
  if (!mf_process_maxfwd_header("10")) {
    sl_send_reply("483", "Too Many Hops");
    exit;
  }

  # Pike DoS check
  if ($sht(srcip=>$si) > 200) {
    xlog("L_WARN", "DoS detected from $si — blocking\n");
    exit;
  }
  $sht(srcip=>$si) = $sht(srcip=>$si) + 1;
}

# ── OPTIONS: Respond to keepalives ────────────────────────────────────────
route[OPTIONS_REPLY] {
  if (is_method("OPTIONS")) {
    sl_send_reply("200", "OK");
    exit;
  }
}

# ── WITHINDLG: Handle in-dialog requests ──────────────────────────────────
route[WITHINDLG] {
  if (!has_totag()) return;

  if (loose_route()) {
    # RTPengine: manage media for in-dialog
    if (is_method("BYE")) {
      rtpengine_manage("delete");
    }
    route(RELAY);
    exit;
  }

  sl_send_reply("404", "Not here");
  exit;
}

# ── INVITE_OUTBOUND: Route outbound calls ──────────────────────────────────
route[INVITE_OUTBOUND] {
  # Only accept calls from internal networks (FreeSWITCH → Kamailio)
  if (!src_ip_match("127.0.0.1") && !src_ip_match("172.16.0.0/12") &&
      !src_ip_match("10.0.0.0/8") && !src_ip_match("192.168.0.0/16")) {
    xlog("L_WARN", "INVITE from unauthorized source: $si — rejecting\n");
    sl_send_reply("403", "Forbidden");
    exit;
  }

  record_route();

  # RTPengine: engage media relay for NAT traversal
  rtpengine_offer("replace-origin replace-session-connection ICE=remove RTP/AVP");

  # Route to configured SIP gateway via dispatcher
  if (!ds_select_dst("1", "4")) {
    xlog("L_ERR", "Dispatcher: no available gateways — 503\n");
    sl_send_reply("503", "Service Unavailable — No Gateways");
    exit;
  }

  t_on_failure("MANAGE_FAILURE");
  t_on_reply("HANDLE_REPLY");

  route(RELAY);
}

# ── RELAY: Forward request ─────────────────────────────────────────────────
route[RELAY] {
  if (!t_relay()) {
    sl_reply_error();
  }
  exit;
}

# ── Reply handler ──────────────────────────────────────────────────────────
onreply_route[HANDLE_REPLY] {
  if (status =~ "[12][0-9][0-9]") {
    # RTPengine: update media path on provisional/final responses
    rtpengine_answer("replace-origin replace-session-connection ICE=remove RTP/AVP");
  }
}

# ── Failure handler ────────────────────────────────────────────────────────
failure_route[MANAGE_FAILURE] {
  if (t_is_canceled()) {
    rtpengine_delete();
    exit;
  }

  # On failure, try next dispatcher destination
  if (t_check_status("503")) {
    if (ds_next_dst()) {
      t_on_failure("MANAGE_FAILURE");
      t_on_reply("HANDLE_REPLY");
      route(RELAY);
      exit;
    }
  }

  # Clean up RTPengine on final failure
  rtpengine_delete();
}
