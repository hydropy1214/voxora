version: '3.9'

networks:
  voxora_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  freeswitch_recordings:
  freeswitch_log:
  coturn_data:

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: voxora
      POSTGRES_PASSWORD: voxora_pass
      POSTGRES_DB: voxora_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      voxora_net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxora -d voxora_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass voxora_redis_pass --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      voxora_net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "voxora_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FreeSWITCH
  # ─────────────────────────────────────────
  freeswitch:
    build:
      context: ./infra/freeswitch
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./infra/freeswitch/conf:/etc/freeswitch:ro
      - freeswitch_recordings:/var/lib/freeswitch/recordings
      - freeswitch_log:/var/log/freeswitch
    environment:
      - ESL_PASSWORD=ClueCon
    cap_add:
      - NET_ADMIN
      - SYS_NICE

  # ─────────────────────────────────────────
  # Kamailio SIP Proxy
  # ─────────────────────────────────────────
  kamailio:
    build:
      context: ./infra/kamailio
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./infra/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
    cap_add:
      - NET_ADMIN
    depends_on:
      - redis

  # ─────────────────────────────────────────
  # RTPengine
  # ─────────────────────────────────────────
  rtpengine:
    image: drachtio/rtpengine:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    command: >
      --interface=172.20.0.1
      --listen-ng=172.20.0.1:2223
      --port-min=10000
      --port-max=20000
      --log-level=6
      --log-facility=daemon

  # ─────────────────────────────────────────
  # Coturn STUN/TURN
  # ─────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - coturn_data:/var/lib/coturn

  # ─────────────────────────────────────────
  # NestJS Backend API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://voxora:voxora_pass@postgres:5432/voxora_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=voxora_redis_pass
      - FREESWITCH_HOST=172.20.0.1
      - FREESWITCH_ESL_PORT=8021
      - FREESWITCH_ESL_PASSWORD=ClueCon
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    networks:
      voxora_net:
        ipv4_address: 172.20.0.20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
      - NEXT_PUBLIC_WS_URL=http://backend:3001
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      voxora_net:
        ipv4_address: 172.20.0.21
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      voxora_net:
        ipv4_address: 172.20.0.22
    depends_on:
      - backend
      - frontend
