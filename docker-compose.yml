version: '3.9'

# ============================================================
#  Voxora Production Docker Compose
#  Full telephony stack: FreeSWITCH + Kamailio + RTPengine + Coturn
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service"

x-restart: &default-restart
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

networks:
  voxora_internal:
    driver: bridge
    internal: false
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
  voxora_sip:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  freeswitch_recordings:
    driver: local
  freeswitch_log:
    driver: local
  freeswitch_db:
    driver: local
  nginx_ssl:
    driver: local
  coturn_db:
    driver: local
  loki_data:
    driver: local

services:

  # ──────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    container_name: voxora_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-voxora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-voxora_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      voxora_internal:
        ipv4_address: 172.20.0.10
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-voxora} -d ${DB_NAME:-voxora_db}"]
      interval: 10s
      start_period: 10s
    logging: *default-logging
    labels:
      service: "postgres"
      voxora.role: "database"

  # ──────────────────────────────────────────────────────
  # Redis 7 (cache + BullMQ + pub/sub)
  # ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *default-restart
    container_name: voxora_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    networks:
      voxora_internal:
        ipv4_address: 172.20.0.11
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    logging: *default-logging
    labels:
      service: "redis"

  # ──────────────────────────────────────────────────────
  # Coturn — STUN/TURN Server
  # ──────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:4.6-alpine
    <<: *default-restart
    container_name: voxora_coturn
    network_mode: host
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - coturn_db:/var/lib/coturn
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3478 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    labels:
      service: "coturn"
      voxora.role: "stun-turn"

  # ──────────────────────────────────────────────────────
  # RTPengine — RTP media relay
  # ──────────────────────────────────────────────────────
  rtpengine:
    image: drachtio/rtpengine:latest
    <<: *default-restart
    container_name: voxora_rtpengine
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    environment:
      - PUBLIC_IP=${PUBLIC_IP:-127.0.0.1}
      - PRIVATE_IP=${PRIVATE_IP:-127.0.0.1}
    command: >
      rtpengine
      --interface=${PRIVATE_IP:-0.0.0.0}!${PUBLIC_IP:-0.0.0.0}
      --listen-ng=127.0.0.1:2223
      --listen-tcp=127.0.0.1:2222
      --port-min=10000
      --port-max=20000
      --log-level=6
      --log-facility=daemon
      --tos=184
      --delete-delay=30
      --timeout=60
      --silent-timeout=3600
      --final-timeout=10800
      --no-fallback
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2223 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    labels:
      service: "rtpengine"
      voxora.role: "rtp-relay"

  # ──────────────────────────────────────────────────────
  # Kamailio — SIP Proxy
  # ──────────────────────────────────────────────────────
  kamailio:
    build:
      context: ./infra/kamailio
      dockerfile: Dockerfile
    <<: *default-restart
    container_name: voxora_kamailio
    network_mode: host
    volumes:
      - ./infra/kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./infra/kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
    environment:
      - PUBLIC_IP=${PUBLIC_IP:-127.0.0.1}
      - PRIVATE_IP=${PRIVATE_IP:-127.0.0.1}
      - FREESWITCH_IP=127.0.0.1
      - FREESWITCH_PORT=5080
      - RTPENGINE_IP=127.0.0.1
      - RTPENGINE_PORT=2223
      - KAMAILIO_SIP_PORT=5060
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    depends_on:
      rtpengine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5060 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    labels:
      service: "kamailio"
      voxora.role: "sip-proxy"

  # ──────────────────────────────────────────────────────
  # FreeSWITCH — Media Server
  # ──────────────────────────────────────────────────────
  freeswitch:
    build:
      context: ./infra/freeswitch
      dockerfile: Dockerfile
    <<: *default-restart
    container_name: voxora_freeswitch
    network_mode: host
    volumes:
      - ./infra/freeswitch/conf:/etc/freeswitch:ro
      - freeswitch_recordings:/var/lib/freeswitch/recordings
      - freeswitch_log:/var/log/freeswitch
      - freeswitch_db:/var/lib/freeswitch/db
      - uploads_data:/app/uploads:ro
    environment:
      - PUBLIC_IP=${PUBLIC_IP:-127.0.0.1}
      - PRIVATE_IP=${PRIVATE_IP:-0.0.0.0}
      - ESL_PASSWORD=${FREESWITCH_ESL_PASSWORD:?ESL_PASSWORD required}
      - RTPENGINE_IP=127.0.0.1
      - RTPENGINE_PORT=2223
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - SYS_NICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -x 'status' 2>/dev/null | grep -q 'UP' || nc -z localhost 8021"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s
    depends_on:
      rtpengine:
        condition: service_healthy
    logging: *default-logging
    labels:
      service: "freeswitch"
      voxora.role: "media-server"

  # ──────────────────────────────────────────────────────
  # NestJS Backend API
  # ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: production
    <<: *default-restart
    container_name: voxora_backend
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=172.20.0.11
      - FREESWITCH_HOST=172.20.0.1
      - FREESWITCH_ESL_PORT=${FREESWITCH_ESL_PORT:-8021}
      - FREESWITCH_ESL_PASSWORD=${FREESWITCH_ESL_PASSWORD}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    networks:
      voxora_internal:
        ipv4_address: 172.20.0.20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      start_period: 60s
    logging: *default-logging
    labels:
      service: "backend"
      voxora.role: "api"

  # ──────────────────────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: production
    <<: *default-restart
    container_name: voxora_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    networks:
      voxora_internal:
        ipv4_address: 172.20.0.21
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
    logging: *default-logging
    labels:
      service: "frontend"
      voxora.role: "web"

  # ──────────────────────────────────────────────────────
  # Nginx — Reverse Proxy + SSL
  # ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: *default-restart
    container_name: voxora_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_ssl:/etc/nginx/ssl
      - uploads_data:/app/uploads:ro
    networks:
      voxora_internal:
        ipv4_address: 172.20.0.22
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health 2>/dev/null || nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    labels:
      service: "nginx"
      voxora.role: "proxy"
