version: '3.9'

# Development override - no FreeSWITCH/Kamailio/RTPengine needed locally
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

networks:
  voxora_net:
    driver: bridge

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      target: development
    command: npm run start:dev
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./apps/frontend
      target: development
    command: npm run dev
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=http://localhost:3001
    ports:
      - "3000:3000"

  # Disable telephony services in dev
  freeswitch:
    profiles: ["telephony"]

  kamailio:
    profiles: ["telephony"]

  rtpengine:
    profiles: ["telephony"]

  coturn:
    profiles: ["telephony"]

  nginx:
    profiles: ["proxy"]
